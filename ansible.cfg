[defaults]
inventory = ansible/inventory/production.yml
roles_path = ansible/roles
collections_paths = ansible/collections:~/.ansible/collections
host_key_checking = False
stdout_callback = ansible.builtin.default
result_format = yaml
forks = 5
retry_files_enabled = False
vault_password_file = ~/.vault_pass.txt
gather_timeout = 20

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=10s -o ServerAliveInterval=30 -o ServerAliveCountMax=3
