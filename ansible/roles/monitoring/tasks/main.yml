---
# Installs vps-monitor: Python health poller + systemd timer (every 5min).
# Manual run (after install): ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --once'
# Test Telegram: ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --test-alert'

# ---- State dir ----
- name: "monitoring | create /opt/vps-monitor"
  ansible.builtin.raw: "sudo mkdir -p /opt/vps-monitor && sudo chmod 700 /opt/vps-monitor"
  changed_when: false

# ---- Poller script ----
# Materialize host-scoped values before the delegated local render below.
- name: "monitoring | prepare host-scoped render vars"
  ansible.builtin.set_fact:
    monitoring_expected_containers: >-
      {{
        (expected_containers | default([]))
        if (expected_containers is defined and not (expected_containers is string))
        else (vault_expected_containers | default([]))
      }}

# Note: template is rendered locally then uploaded via copy to avoid become: true
# variable scoping issues that cause Jinja2 vault vars to render as empty.
- name: "monitoring | render vps-monitor.py locally"
  ansible.builtin.template:
    src: vps-monitor.py.j2
    dest: "{{ playbook_dir }}/../../reports/.vps-monitor-rendered-{{ inventory_hostname }}.py"
    mode: "0600"
  delegate_to: localhost
  become: false
  check_mode: false

- name: "monitoring | deploy vps-monitor.py"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../reports/.vps-monitor-rendered-{{ inventory_hostname }}.py"
    dest: /usr/local/bin/vps-monitor.py
    owner: root
    group: root
    mode: "0700"
  become: true
  register: r_script

- name: "monitoring | cleanup rendered local copy"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../../reports/.vps-monitor-rendered-{{ inventory_hostname }}.py"
    state: absent
  delegate_to: localhost
  become: false
  check_mode: false

# ---- External watchdog script ----
- name: "monitoring | render vps-external-watchdog.py locally"
  ansible.builtin.template:
    src: vps-external-watchdog.py.j2
    dest: "{{ playbook_dir }}/../../reports/.vps-external-watchdog-rendered-{{ inventory_hostname }}.py"
    mode: "0600"
  delegate_to: localhost
  become: false
  check_mode: false

- name: "monitoring | deploy vps-external-watchdog.py"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../reports/.vps-external-watchdog-rendered-{{ inventory_hostname }}.py"
    dest: /usr/local/bin/vps-external-watchdog.py
    owner: root
    group: root
    mode: "0700"
  become: true
  register: r_external_script

- name: "monitoring | cleanup rendered external watchdog copy"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../../reports/.vps-external-watchdog-rendered-{{ inventory_hostname }}.py"
    state: absent
  delegate_to: localhost
  become: false
  check_mode: false

# ---- Systemd units ----
- name: "monitoring | deploy vps-monitor.service"
  ansible.builtin.template:
    src: vps-monitor.service.j2
    dest: /etc/systemd/system/vps-monitor.service
    owner: root
    group: root
    mode: "0644"
  become: true
  register: r_service

- name: "monitoring | deploy vps-monitor.timer"
  ansible.builtin.template:
    src: vps-monitor.timer.j2
    dest: /etc/systemd/system/vps-monitor.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  register: r_timer

- name: "monitoring | deploy vps-external-watchdog.service"
  ansible.builtin.template:
    src: vps-external-watchdog.service.j2
    dest: /etc/systemd/system/vps-external-watchdog.service
    owner: root
    group: root
    mode: "0644"
  become: true
  register: r_external_service

- name: "monitoring | deploy vps-external-watchdog.timer"
  ansible.builtin.template:
    src: vps-external-watchdog.timer.j2
    dest: /etc/systemd/system/vps-external-watchdog.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  register: r_external_timer

- name: "monitoring | reload systemd if units changed"
  ansible.builtin.raw: "sudo systemctl daemon-reload"
  when: r_service.changed or r_timer.changed or r_external_service.changed or r_external_timer.changed
  changed_when: true

- name: "monitoring | enable + start timer"
  ansible.builtin.raw: "sudo systemctl enable --now vps-monitor.timer"
  register: r_enable
  changed_when: "'Created symlink' in (r_enable.stdout | default(''))"

- name: "monitoring | enable + start external watchdog timer"
  ansible.builtin.raw: "sudo systemctl enable --now vps-external-watchdog.timer"
  register: r_external_enable
  changed_when: "'Created symlink' in (r_external_enable.stdout | default(''))"

# ---- Logrotate ----
- name: "monitoring | logrotate for monitoring logs"
  ansible.builtin.raw: |
    sudo tee /etc/logrotate.d/vps-monitor > /dev/null << 'EOF'
    /var/log/vps-monitor.log /var/log/vps-external-watchdog.log {
        weekly
        rotate 8
        compress
        delaycompress
        missingok
        notifempty
    }
    EOF
    echo CHANGED
  register: r_logrotate
  changed_when: "'CHANGED' in r_logrotate.stdout"

# ---- Verify ----
- name: "monitoring | verify timer is active"
  ansible.builtin.raw: "systemctl is-active vps-monitor.timer || echo INACTIVE"
  register: r_verify
  changed_when: false

- name: "monitoring | verify external watchdog timer is active"
  ansible.builtin.raw: "systemctl is-active vps-external-watchdog.timer || echo INACTIVE"
  register: r_external_verify
  changed_when: false

- name: "monitoring | display status"
  ansible.builtin.debug:
    msg:
      - "vps-monitor.timer: {{ r_verify.stdout | default('check mode') | trim }}"
      - "vps-external-watchdog.timer: {{ r_external_verify.stdout | default('check mode') | trim }}"
      - "Script: /usr/local/bin/vps-monitor.py"
      - "External watchdog: /usr/local/bin/vps-external-watchdog.py"
      - "State:  /opt/vps-monitor/state.json"
      - "Log:    /var/log/vps-monitor.log"
      - "External log: /var/log/vps-external-watchdog.log"
      - ""
      - "Manual check:   ssh {{ ansible_user }}@{{ ansible_host }} 'sudo python3 /usr/local/bin/vps-monitor.py --once'"
      - "Test Telegram:  ssh {{ ansible_user }}@{{ ansible_host }} 'sudo python3 /usr/local/bin/vps-monitor.py --test-alert'"
      - "Watchdog test:  ssh {{ ansible_user }}@{{ ansible_host }} 'sudo python3 /usr/local/bin/vps-external-watchdog.py --test-alert'"
      - "View log:       ssh {{ ansible_user }}@{{ ansible_host }} 'sudo tail -50 /var/log/vps-monitor.log'"
      - "Timer status:   ssh {{ ansible_user }}@{{ ansible_host }} 'systemctl status vps-monitor.timer'"
