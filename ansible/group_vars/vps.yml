---
# Non-secret VPS-specific defaults. Real threshold / filter values live in vault.

# Paths watched by disk_audit (not secrets)
audit_paths:
  - /var/log
  - /var/lib/docker
  - /var/cache
  - /opt
  - /home

# Report top-N
audit_top_dirs: 20
audit_top_files: 50
audit_min_file_size_mb: 100

# Logrotate
logrotate_config_name: vps-management
logrotate_targets:
  - path: /var/log/caddy
    pattern: "*.log"

# Expected application directories and containers are host-specific.
# Per-host inventory vars may override these; legacy vault_expected_containers
# is kept as the vps-prod default.
expected_app_dirs: []
expected_containers: "{{ vault_expected_containers | default([]) }}"

# Health threshold defaults (overridable from vault)
disk_warn_pct_default: 80
disk_crit_pct_default: 90
mem_warn_mb_default: 500
mem_crit_mb_default: 200
loadavg_warn: 2.0
loadavg_crit: 4.0
