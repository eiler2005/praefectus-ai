---
# Inventory production. Connection params come from encrypted vault vars.
# Do not put real IP/SSH/user/key values here.
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
  children:
    vps_targets:
      vars:
        ansible_host: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh --host ' ~ inventory_hostname ~ ' ssh_host') }}"
        ansible_user: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh --host ' ~ inventory_hostname ~ ' ssh_user') }}"
        ansible_port: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh --host ' ~ inventory_hostname ~ ' ssh_port') | default(22, true) }}"
        ansible_ssh_private_key_file: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh --host ' ~ inventory_hostname ~ ' ssh_key') | default('~/.ssh/id_rsa', true) }}"
      children:
        vps:
          hosts:
            vps-hetzner-prod:
              vps_display_name: maxtg-router-openclaw-cx23
              expected_app_dirs:
                - /opt/maxtg-bridge
                - /opt/openclaw
                - /opt/lightrag
                - /opt/fluentloop-bot
              expected_host_files:
                - path: /etc/ssh/sshd_config.d/51-channel-m-reverse.conf
                  owner: router_configuration
                  purpose: Channel M deploy-user scoped GatewayPorts policy
                - path: /usr/local/sbin/channel-m-reverse-firewall.sh
                  owner: router_configuration
                  purpose: Channel M docker bridge firewall persistence
                - path: /usr/local/sbin/channel-m-reverse-listener-watchdog.sh
                  owner: router_configuration
                  purpose: Channel M stale reverse listener recovery
                - path: /etc/systemd/system/channel-m-reverse-firewall.service
                  owner: router_configuration
                  purpose: Channel M docker bridge firewall systemd unit
                - path: /etc/systemd/system/channel-m-reverse-firewall.timer
                  owner: router_configuration
                  purpose: Channel M docker bridge firewall timer
                - path: /etc/systemd/system/channel-m-reverse-listener-watchdog.service
                  owner: router_configuration
                  purpose: Channel M stale listener watchdog unit
                - path: /etc/systemd/system/channel-m-reverse-listener-watchdog.timer
                  owner: router_configuration
                  purpose: Channel M stale listener watchdog timer
              expected_systemd_timers:
                - name: vps-monitor.timer
                  owner: vps_management
                - name: vps-external-watchdog.timer
                  owner: vps_management
                - name: channel-m-reverse-firewall.timer
                  owner: router_configuration
                - name: channel-m-reverse-listener-watchdog.timer
                  owner: router_configuration
              restricted_tcp_listeners:
                - port: 18057
                  name: channel-m-reverse
                  owner: router_configuration / maxtg_bridge
                  expected_scope: docker_bridge
            vps-hostkey-hermes:
              vps_display_name: pulsartrlab-hermes-hostkey
              expected_app_dirs:
                - /opt/stealth
                - /opt/moex-futoi
              expected_containers:
                - name: caddy
                  owner: router_configuration
                  healthcheck: docker
                - name: xray
                  owner: router_configuration
                  healthcheck: docker
                - name: moex-futoi-bot-1
                  owner: moex_futoi
                  healthcheck: docker
              expected_systemd_timers:
                - name: vps-monitor.timer
                  owner: vps_management
                - name: vps-external-watchdog.timer
                  owner: vps_management
        vps_bootstrap:
          hosts: {}
