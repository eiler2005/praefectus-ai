---
# Inventory production. Connection params come from encrypted vault vars.
# Do not put real IP/SSH/user/key values here.
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
  children:
    vps:
      hosts:
        vps-prod:
          ansible_host: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh vault_vps_ssh_host') }}"
          ansible_user: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh vault_vps_ssh_user') }}"
          ansible_port: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh vault_vps_ssh_port') | default(22, true) }}"
          ansible_ssh_private_key_file: "{{ lookup('ansible.builtin.pipe', inventory_dir ~ '/../scripts/vault-get.sh vault_vps_ssh_key') | default('~/.ssh/id_rsa', true) }}"
