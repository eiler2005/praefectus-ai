---
# Inventory production. Connection params — прямые значения (vault не разворачивается здесь в ansible 2.20+).
# Секреты (токены, IP) — в group_vars/all/vault.yml (зашифровано), используются в tasks/templates.
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
  children:
    vps:
      hosts:
        vps-prod:
          ansible_host: 198.51.100.10
          ansible_user: deploy
          ansible_port: 22
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
