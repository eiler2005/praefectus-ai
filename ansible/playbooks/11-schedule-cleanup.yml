---
# DEPRECATED.
# Kept only as a guardrail for agents/operators who still reach for the old
# filename. The canonical weekly cleanup automation is:
#   ansible-playbook playbooks/11-periodic-cleanup-setup.yml
#
# Rationale: the old vps-weekly-cleanup.timer duplicated vps-cleanup.timer.

- name: "11 | Deprecated cleanup timer entrypoint"
  hosts: vps
  gather_facts: false

  tasks:
    - name: "11 | stop | use canonical periodic cleanup playbook"
      ansible.builtin.fail:
        msg: |
          playbooks/11-schedule-cleanup.yml is deprecated and intentionally does nothing.
          Use playbooks/11-periodic-cleanup-setup.yml instead.
          That playbook manages vps-cleanup.timer and retires legacy vps-weekly-cleanup.timer.
