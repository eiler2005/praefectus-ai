---
# Read-only health gate. No mutations.
# Uses the raw module (works with pipelining on this VPS).
# Checks: disk, mem, load, docker daemon, containers, ufw, app dirs,
# host guardrail files, systemd timers, restricted TCP listeners.

- name: "99 | Verify — read-only health checks"
  hosts: vps
  gather_facts: false
  vars_files:
    - ../group_vars/all/vault.yml

  vars:
    report_dir_local: "{{ playbook_dir }}/../../reports"

  tasks:
    - name: "verify | 1) ssh + python reachable"
      ansible.builtin.raw: "python3 -c 'print(\"pong\")'"
      register: vfy_ssh
      changed_when: false
      check_mode: false

    - name: "verify | init | timestamp"
      ansible.builtin.raw: "date -u +%Y%m%dT%H%M%S"
      register: verify_ts
      changed_when: false
      check_mode: false

    - name: "verify | 2) disk usage /"
      ansible.builtin.raw: "df -BM --output=pcent / | tail -1 | tr -d ' %M'"
      register: vfy_disk_pct_raw
      changed_when: false
      check_mode: false

    - name: "verify | set disk fact"
      ansible.builtin.set_fact:
        vfy_disk_pct: "{{ vfy_disk_pct_raw.stdout | trim | int }}"

    - name: "verify | disk warn?"
      ansible.builtin.debug:
        msg: "WARN disk {{ vfy_disk_pct }}% >= {{ vault_disk_warn_pct | default(80) }}%"
      when: vfy_disk_pct | int >= (vault_disk_warn_pct | default(80)) | int

    - name: "verify | 3) memory available"
      ansible.builtin.raw: "free -m | awk '/^Mem:/ {print $7}'"
      register: vfy_mem_raw
      changed_when: false
      check_mode: false

    - name: "verify | set mem fact"
      ansible.builtin.set_fact:
        vfy_mem_mb: "{{ vfy_mem_raw.stdout | trim | int }}"

    - name: "verify | 3b) swap used pct"
      ansible.builtin.raw: |
        free -m | awk '/^Swap:/ {t=$2; u=$3; if(t>0) printf "%d",int(u/t*100); else print 0}'
      register: vfy_swap_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | set swap fact"
      ansible.builtin.set_fact:
        vfy_swap_pct: "{{ vfy_swap_raw.stdout | trim | default('0') | int }}"

    - name: "verify | mem warn?"
      ansible.builtin.debug:
        msg: "WARN memory {{ vfy_mem_mb }}M available < {{ vault_mem_warn_mb | default(500) }}M"
      when: vfy_mem_mb | int < (vault_mem_warn_mb | default(500)) | int

    - name: "verify | swap warn?"
      ansible.builtin.debug:
        msg: "WARN swap {{ vfy_swap_pct }}% >= {{ vault_swap_warn_pct | default(60) }}%"
      when: vfy_swap_pct | int >= (vault_swap_warn_pct | default(60)) | int

    - name: "verify | 4) load avg 5min"
      ansible.builtin.raw: "awk '{print $2}' /proc/loadavg"
      register: vfy_load_raw
      changed_when: false
      check_mode: false

    - name: "verify | 5) docker daemon"
      ansible.builtin.raw: "systemctl is-active docker || echo inactive"
      register: vfy_docker_raw
      changed_when: false
      check_mode: false

    - name: "verify | 6) running containers"
      ansible.builtin.raw: !unsafe "docker ps --format '{{.Names}}'"
      register: vfy_containers_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 7) ufw status"
      ansible.builtin.raw: "sudo ufw status | head -1"
      register: vfy_ufw_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 8) expected app dirs"
      ansible.builtin.raw: |
        {% if (expected_app_dirs | default([]) | length) == 0 %}
        echo "(none configured)"
        {% else %}
        for d in {{ expected_app_dirs | default([]) | join(' ') }}; do
          [ -d "$d" ] && echo "OK $d" || echo "MISSING $d"
        done
        {% endif %}
      register: vfy_dirs_raw
      changed_when: false
      check_mode: false

    - name: "verify | 9) journal disk usage"
      ansible.builtin.raw: "journalctl --disk-usage 2>/dev/null | head -1"
      register: vfy_journal_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 10) container restart counts"
      ansible.builtin.raw: |
        docker ps -q 2>/dev/null | xargs docker inspect 2>/dev/null | python3 -c "
        import json,sys
        data=json.load(sys.stdin)
        out=[]
        for c in data:
            name=c['Name'].lstrip('/')
            rc=c.get('RestartCount',0)
            if rc>0:
                out.append(f'{name}: RestartCount={rc}')
        print('\n'.join(out) if out else 'all zero')
        " 2>/dev/null || echo "n/a"
      register: vfy_restarts_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 11) expected host files"
      ansible.builtin.raw: |
        {% if (expected_host_files | default([]) | length) == 0 %}
        echo "(none configured)"
        {% else %}
        {% for item in expected_host_files | default([]) %}
        if [ -e {{ item.path | quote }} ]; then
          echo "OK {{ item.path }} owner={{ item.owner | default('unknown') }}"
        else
          echo "MISSING {{ item.path }} owner={{ item.owner | default('unknown') }}"
        fi
        {% endfor %}
        {% endif %}
      register: vfy_host_files_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 12) expected systemd timers"
      ansible.builtin.raw: |
        {% if (expected_systemd_timers | default([]) | length) == 0 %}
        echo "(none configured)"
        {% else %}
        {% for item in expected_systemd_timers | default([]) %}
        timer={{ item.name | quote }}
        enabled="$(systemctl is-enabled "$timer" 2>/dev/null || true)"
        active="$(systemctl is-active "$timer" 2>/dev/null || true)"
        if [ "$enabled" = "enabled" ] && [ "$active" = "active" ]; then
          echo "OK $timer owner={{ item.owner | default('unknown') }} enabled active"
        else
          echo "FAIL $timer owner={{ item.owner | default('unknown') }} enabled=${enabled:-n/a} active=${active:-n/a}"
        fi
        {% endfor %}
        {% endif %}
      register: vfy_systemd_timers_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | 13) restricted TCP listeners"
      ansible.builtin.raw: |
        python3 - <<'PY'
        import ipaddress
        import json
        import subprocess

        listeners = {{ restricted_tcp_listeners | default([]) | to_json }}
        if not listeners:
            print("(none configured)")
            raise SystemExit(0)

        raw = subprocess.run(
            ["ss", "-H", "-ltn"],
            text=True,
            stdout=subprocess.PIPE,
            stderr=subprocess.DEVNULL,
            check=False,
        ).stdout
        private_ipv4_nets = [
            ipaddress.ip_network("10.0.0.0/8"),
            ipaddress.ip_network("172.16.0.0/12"),
            ipaddress.ip_network("192.168.0.0/16"),
        ]
        public_hosts = {"0.0.0.0", "*", "::", "[::]"}

        def split_local(value):
            if value.startswith("["):
                host, _, port = value.rpartition("]:")
                return host + "]", port
            host, _, port = value.rpartition(":")
            return host, port

        def normalized(host):
            return host.strip("[]")

        def is_docker_bridge(host):
            try:
                ip = ipaddress.ip_address(normalized(host))
            except ValueError:
                return False
            return ip.version == 4 and any(ip in net for net in private_ipv4_nets)

        by_port = {}
        for line in raw.splitlines():
            parts = line.split()
            if len(parts) < 4:
                continue
            host, port = split_local(parts[3])
            by_port.setdefault(port, []).append(host)

        for item in listeners:
            port = str(item.get("port", ""))
            name = item.get("name", port)
            scope = item.get("expected_scope", "restricted")
            owner = item.get("owner", "unknown")
            hosts = by_port.get(port, [])
            if not hosts:
                print(f"MISSING {name} port={port} owner={owner}")
                continue
            public = [host for host in hosts if host in public_hosts]
            if public:
                print(f"UNSAFE {name} port={port} owner={owner} public={','.join(public)} all={','.join(hosts)}")
                continue
            if scope == "docker_bridge" and not any(is_docker_bridge(host) for host in hosts):
                print(f"WRONG_SCOPE {name} port={port} owner={owner} binds={','.join(hosts)} expected=docker_bridge")
                continue
            print(f"OK {name} port={port} owner={owner} binds={','.join(hosts)}")
        PY
      register: vfy_restricted_listeners_raw
      changed_when: false
      check_mode: false
      failed_when: false

    - name: "verify | set host guardrail facts"
      ansible.builtin.set_fact:
        vfy_host_files_failed: "{{ 'MISSING ' in (vfy_host_files_raw.stdout | default('')) }}"
        vfy_systemd_timers_failed: "{{ 'FAIL ' in (vfy_systemd_timers_raw.stdout | default('')) }}"
        vfy_restricted_listeners_failed: >-
          {{ 'MISSING ' in (vfy_restricted_listeners_raw.stdout | default(''))
             or 'UNSAFE ' in (vfy_restricted_listeners_raw.stdout | default(''))
             or 'WRONG_SCOPE ' in (vfy_restricted_listeners_raw.stdout | default('')) }}

    - name: "verify | display full summary"
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "VERIFY SUMMARY — {{ inventory_hostname }}"
          - "============================================================"
          - "SSH:         OK"
          - "Disk /:      {{ vfy_disk_pct }}% | WARN >= {{ vault_disk_warn_pct | default(80) }}% CRIT >= {{ vault_disk_crit_pct | default(90) }}%"
          - "Memory:      {{ vfy_mem_mb }}M avail | WARN < {{ vault_mem_warn_mb | default(500) }}M"
          - "Swap:        {{ vfy_swap_pct }}% used | WARN >= {{ vault_swap_warn_pct | default(60) }}% CRIT >= {{ vault_swap_crit_pct | default(80) }}%"
          - "Load 5min:   {{ vfy_load_raw.stdout | trim }}"
          - "Docker:      {{ vfy_docker_raw.stdout | trim }}"
          - "UFW:         {{ vfy_ufw_raw.stdout | trim | default('n/a') }}"
          - "Journal:     {{ vfy_journal_raw.stdout | trim | default('n/a') }}"
          - "Restarts:    {{ vfy_restarts_raw.stdout | trim | default('n/a') }}"
          - "------------------------------------------------------------"
          - "Running containers:"
          - "{{ vfy_containers_raw.stdout_lines | default([]) }}"
          - "------------------------------------------------------------"
          - "App dirs:"
          - "{{ vfy_dirs_raw.stdout_lines | default([]) }}"
          - "Host files:"
          - "{{ vfy_host_files_raw.stdout_lines | default([]) }}"
          - "Systemd timers:"
          - "{{ vfy_systemd_timers_raw.stdout_lines | default([]) }}"
          - "Restricted TCP listeners:"
          - "{{ vfy_restricted_listeners_raw.stdout_lines | default([]) }}"
          - "============================================================"

    # ---- REPORTS (before fail tasks, so report is always written) ----
    - name: "verify | compute overall_status"
      ansible.builtin.set_fact:
        vfy_overall_status: >-
          {{ 'fail' if (vfy_disk_pct | int >= (vault_disk_crit_pct | default(90)) | int
                        or vfy_mem_mb | int < (vault_mem_crit_mb | default(200)) | int
                        or vfy_swap_pct | int >= (vault_swap_crit_pct | default(80)) | int
                        or 'active' not in (vfy_docker_raw.stdout | default(''))
                        or vfy_host_files_failed | bool
                        or vfy_systemd_timers_failed | bool
                        or vfy_restricted_listeners_failed | bool)
             else 'warn' if (vfy_disk_pct | int >= (vault_disk_warn_pct | default(80)) | int
                             or vfy_mem_mb | int < (vault_mem_warn_mb | default(500)) | int
                             or vfy_swap_pct | int >= (vault_swap_warn_pct | default(60)) | int)
             else 'ok' }}

    - name: "verify | build health data dict"
      ansible.builtin.set_fact:
        vfy_health_data:
          timestamp: "{{ verify_ts.stdout | trim }}"
          host: "{{ inventory_hostname }}"
          overall_status: "{{ vfy_overall_status }}"
          metrics:
            disk_pct: "{{ vfy_disk_pct | int }}"
            mem_available_mb: "{{ vfy_mem_mb | int }}"
            load_5min: "{{ vfy_load_raw.stdout | trim | float }}"
            swap_used_pct: "{{ vfy_swap_pct | int }}"
          running_containers: "{{ vfy_containers_raw.stdout_lines | default([]) }}"
          host_files: "{{ vfy_host_files_raw.stdout_lines | default([]) }}"
          systemd_timers: "{{ vfy_systemd_timers_raw.stdout_lines | default([]) }}"
          restricted_tcp_listeners: "{{ vfy_restricted_listeners_raw.stdout_lines | default([]) }}"

    - name: "verify | ensure health report dir"
      ansible.builtin.file:
        path: "{{ report_dir_local }}/health"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false
      check_mode: false

    - name: "verify | write JSON health report → reports/health/{{ verify_ts.stdout | trim }}.json"
      ansible.builtin.copy:
        dest: "{{ report_dir_local }}/health/{{ verify_ts.stdout | trim }}.json"
        mode: "0644"
        content: "{{ vfy_health_data | to_nice_json }}\n"
      delegate_to: localhost
      become: false
      check_mode: false

    - name: "verify | write verify-{{ verify_ts.stdout | trim }}.md"
      ansible.builtin.copy:
        dest: "{{ report_dir_local }}/verify-{{ verify_ts.stdout | trim }}.md"
        mode: "0644"
        content: |
          # Verify report — {{ inventory_hostname }} — {{ verify_ts.stdout | trim }}

          **Overall:** {{ vfy_overall_status | upper }}

          ## System metrics

          | Check | Value | Status |
          |---|---|---|
          | Disk / | {{ vfy_disk_pct }}% used | {{ 'CRIT' if vfy_disk_pct | int >= (vault_disk_crit_pct | default(90)) | int else 'WARN' if vfy_disk_pct | int >= (vault_disk_warn_pct | default(80)) | int else 'OK' }} |
          | Memory | {{ vfy_mem_mb }}M available | {{ 'CRIT' if vfy_mem_mb | int < (vault_mem_crit_mb | default(200)) | int else 'WARN' if vfy_mem_mb | int < (vault_mem_warn_mb | default(500)) | int else 'OK' }} |
          | Swap | {{ vfy_swap_pct }}% used | {{ 'CRIT' if vfy_swap_pct | int >= (vault_swap_crit_pct | default(80)) | int else 'WARN' if vfy_swap_pct | int >= (vault_swap_warn_pct | default(60)) | int else 'OK' }} |
          | Load 5min | {{ vfy_load_raw.stdout | trim }} | {{ 'CRIT' if vfy_load_raw.stdout | trim | float >= 4.0 else 'WARN' if vfy_load_raw.stdout | trim | float >= 2.0 else 'OK' }} |
          | Docker | {{ vfy_docker_raw.stdout | trim }} | {{ 'OK' if 'active' in (vfy_docker_raw.stdout | default('')) else 'CRIT' }} |
          | UFW | {{ vfy_ufw_raw.stdout | trim | default('n/a') }} | {{ 'OK' if 'active' in (vfy_ufw_raw.stdout | default('')) else 'WARN' }} |

          ## Running containers

          ```
          {{ vfy_containers_raw.stdout | default('(none)') }}
          ```

          ## App directories

          ```
          {{ vfy_dirs_raw.stdout | default('(none)') }}
          ```

          ## Journal disk

          {{ vfy_journal_raw.stdout | trim | default('n/a') }}

          ## Container restart counts

          ```
          {{ vfy_restarts_raw.stdout | trim | default('n/a') }}
          ```

          ## Host guardrail files

          ```
          {{ vfy_host_files_raw.stdout | trim | default('n/a') }}
          ```

          ## Systemd timers

          ```
          {{ vfy_systemd_timers_raw.stdout | trim | default('n/a') }}
          ```

          ## Restricted TCP listeners

          ```
          {{ vfy_restricted_listeners_raw.stdout | trim | default('n/a') }}
          ```
      delegate_to: localhost
      become: false
      check_mode: false

    - name: "verify | fail if disk critical"
      ansible.builtin.fail:
        msg: "CRITICAL: disk {{ vfy_disk_pct }}% >= {{ vault_disk_crit_pct | default(90) }}%"
      when: vfy_disk_pct | int >= (vault_disk_crit_pct | default(90)) | int

    - name: "verify | fail if memory critical"
      ansible.builtin.fail:
        msg: "CRITICAL: memory {{ vfy_mem_mb }}M available < {{ vault_mem_crit_mb | default(200) }}M"
      when: vfy_mem_mb | int < (vault_mem_crit_mb | default(200)) | int

    - name: "verify | fail if swap critical"
      ansible.builtin.fail:
        msg: "CRITICAL: swap {{ vfy_swap_pct }}% >= {{ vault_swap_crit_pct | default(80) }}%"
      when: vfy_swap_pct | int >= (vault_swap_crit_pct | default(80)) | int

    - name: "verify | fail if docker not active"
      ansible.builtin.fail:
        msg: "CRITICAL: docker daemon is not active"
      when: "'active' not in (vfy_docker_raw.stdout | default(''))"

    - name: "verify | fail if expected host files are missing"
      ansible.builtin.fail:
        msg: "CRITICAL: expected host guardrail files missing: {{ vfy_host_files_raw.stdout_lines | select('search', '^MISSING ') | list }}"
      when: vfy_host_files_failed | bool

    - name: "verify | fail if expected systemd timers are inactive"
      ansible.builtin.fail:
        msg: "CRITICAL: expected systemd timers inactive: {{ vfy_systemd_timers_raw.stdout_lines | select('search', '^FAIL ') | list }}"
      when: vfy_systemd_timers_failed | bool

    - name: "verify | fail if restricted TCP listeners are unsafe"
      ansible.builtin.fail:
        msg: "CRITICAL: restricted TCP listener problem: {{ vfy_restricted_listeners_raw.stdout_lines | reject('search', '^OK ') | reject('equalto', '(none configured)') | list }}"
      when: vfy_restricted_listeners_failed | bool
