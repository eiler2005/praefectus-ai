---
# Installs VPS health monitoring:
#   - Python poller + systemd timer on each VPS (every 5 min)
#   - External cross-host reachability watchdog (every 1 min, TCP/443 by default)
#
# Required vault vars:
#   vault_tg_infra_bot_token: "bot_token"
#   vault_tg_infra_chat_id:   "-1001234567890"
#   vault_tg_infra_topic_id:  "42"   # optional — thread ID in a group
#
# Workflow:
#   ansible-playbook playbooks/20-monitoring.yml --check     # dry-run
#   ansible-playbook playbooks/20-monitoring.yml             # install
#
# Manual check after install:
#   ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --once'
#
# Telegram test:
#   ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --test-alert'
#
# External watchdog test:
#   ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-external-watchdog.py --test-alert'
#
# Control-machine shortcut:
#   ./modules/monitoring/bin/run-check
#   ./modules/monitoring/bin/run-check --test-alert
#   ./modules/monitoring/bin/run-check --watchdog-test
#
# Disable timers:
#   ssh deploy@<vps> 'sudo systemctl disable --now vps-monitor.timer'
#   ssh deploy@<vps> 'sudo systemctl disable --now vps-external-watchdog.timer'

- name: "20 | VPS monitoring — install poller + timer"
  hosts: vps
  gather_facts: false
  vars_files:
    - ../group_vars/all/vault.yml

  tasks:
    # --- Validation ---
    - name: "20 | validate | Telegram tokens configured"
      ansible.builtin.fail:
        msg: |
          vault_tg_infra_bot_token and/or vault_tg_infra_chat_id not set.
          Add to ansible/secrets/vault.yml (see vault.yml.example).
          Without Telegram the monitor installs and runs, but sends no alerts.
      when:
        - vault_tg_infra_bot_token is not defined or vault_tg_infra_bot_token | length == 0
          or vault_tg_infra_chat_id is not defined or vault_tg_infra_chat_id | length == 0
      ignore_errors: true  # warn, don't abort — monitoring works without TG

    - name: "20 | role | monitoring"
      ansible.builtin.include_role:
        name: monitoring

    # --- Tags: check (manual one-off run) ---
    - name: "20 | check | run vps-monitor --once (manual)"
      ansible.builtin.raw: "sudo python3 /usr/local/bin/vps-monitor.py --once"
      register: r_check
      changed_when: false
      check_mode: false
      tags: [check, never]  # only runs with --tags check

    - name: "20 | check | display result"
      ansible.builtin.debug:
        msg: "{{ r_check.stdout_lines | default([]) }}"
      tags: [check, never]

    # --- Summary ---
    - name: "20 | summary"
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "MONITORING INSTALLED — {{ inventory_hostname }}"
          - "============================================"
          - "Timer: vps-monitor.timer (every 5 min)"
          - "External watchdog: vps-external-watchdog.timer (every 1 min)"
          - "Script: /usr/local/bin/vps-monitor.py"
          - "Watchdog script: /usr/local/bin/vps-external-watchdog.py"
          - "Log: /var/log/vps-monitor.log"
          - "Watchdog log: /var/log/vps-external-watchdog.log"
          - ""
          - "Manual check from Mac:"
          - "  ./modules/monitoring/bin/run-check"
          - "  ./modules/monitoring/bin/run-check --test-alert"
          - "  ./modules/monitoring/bin/run-check --watchdog-test"
          - ""
          - "Or directly on VPS:"
          - "  ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --once'"
          - "  ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-monitor.py --test-alert'"
          - "  ssh deploy@<vps> 'sudo python3 /usr/local/bin/vps-external-watchdog.py --once'"
          - "============================================"
