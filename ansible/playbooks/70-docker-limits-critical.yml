---
# Applies resource limits to critical containers.
#
# Uses TWO mechanisms:
#   1. docker-compose.override.local.yml — persistent (active on next compose up)
#   2. docker update --memory/--cpus/--pids-limit/--restart — immediate where Docker supports it
#
# Out of scope (other owners' zones):
#   - routing-side containers managed by the routing project
#   - application containers whose limit is already set in their own prod compose
#
# When restarting the affected stack manually:
#   List services explicitly. Some compose files contain auxiliary services
#   (e.g. cron bridges) that should NOT be started from this directory.
#
# Restart commands are documented in each generated override file. Keep those
# comments on one physical line each: heredocs can mangle trailing backslashes.

- name: "70 | Docker resource limits — critical services"
  hosts: vps
  gather_facts: false

  vars:
    mem_openclaw_gateway: "{{ vault_mem_openclaw_gateway | default('1224m') }}"
    mem_omniroute:        "{{ vault_mem_omniroute        | default('512m') }}"
    mem_lightrag:         "{{ vault_mem_lightrag         | default('2304m') }}"
    memswap_lightrag:     "{{ vault_memswap_lightrag     | default('2816m') }}"
    mem_redis:            "{{ vault_mem_redis            | default('256m') }}"
    cpu_openclaw_gateway: "{{ vault_cpu_openclaw_gateway | default('0.90') }}"
    cpu_omniroute:        "{{ vault_cpu_omniroute        | default('0.25') }}"
    cpu_lightrag:         "{{ vault_cpu_lightrag         | default('0.45') }}"
    cpu_ai_path_cap:      "{{ vault_cpu_ai_path_cap      | default('1.60') }}"
    pids_openclaw_gateway: "{{ vault_pids_openclaw_gateway | default(256) }}"
    pids_omniroute:        "{{ vault_pids_omniroute        | default(128) }}"
    pids_lightrag:         "{{ vault_pids_lightrag         | default(128) }}"
    restart_openclaw_gateway: "{{ vault_restart_openclaw_gateway | default('on-failure:5') }}"
    log_driver_critical:      "{{ vault_log_driver_critical      | default('json-file') }}"
    log_max_size_critical:    "{{ vault_log_max_size_critical    | default('10m') }}"
    log_max_file_critical:    "{{ vault_log_max_file_critical    | default('3') }}"

  tasks:
    # ---- AUDIT ----
    - name: "70 | audit | current RAM usage"
      ansible.builtin.raw: !unsafe |
        docker stats --no-stream --format \
          "table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}" 2>/dev/null
      register: docker_stats
      changed_when: false
      check_mode: false

    - name: "70 | audit | display stats"
      ansible.builtin.debug:
        msg: "{{ docker_stats.stdout_lines }}"

    - name: "70 | audit | managed app dirs present"
      ansible.builtin.raw: |
        for d in /opt/openclaw /opt/lightrag /opt/integration-bus; do
          if [ -d "$d" ]; then echo "$d:present"; else echo "$d:absent"; fi
        done
      register: app_dirs
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "70 | audit | display app dirs"
      ansible.builtin.debug:
        msg: "{{ app_dirs.stdout_lines | default([]) }}"

    # ---- OVERRIDE FILES ----

    # gateway + router-service in the same /opt/<app>/ — both go in one override file
    - name: "70 | limits | openclaw-gateway ({{ cpu_openclaw_gateway }} CPU, {{ mem_openclaw_gateway }}) + omniroute ({{ cpu_omniroute }} CPU, {{ mem_omniroute }})"
      ansible.builtin.raw: |
        sudo tee /opt/openclaw/docker-compose.override.local.yml > /dev/null << 'EOF'
        # Managed by vps_management — host-level resource constraints only.
        # Do NOT edit service definitions here.
        # Restart ONLY the listed services (some compose files include unrelated services):
        #   cd /opt/openclaw && sudo docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.override.local.yml up -d openclaw-gateway omniroute
        services:
          openclaw-gateway:
            cpus: "{{ cpu_openclaw_gateway }}"
            mem_limit: {{ mem_openclaw_gateway }}
            memswap_limit: {{ mem_openclaw_gateway }}
            pids_limit: {{ pids_openclaw_gateway }}
            restart: "{{ restart_openclaw_gateway }}"
            logging:
              driver: {{ log_driver_critical }}
              options:
                max-size: "{{ log_max_size_critical }}"
                max-file: "{{ log_max_file_critical }}"
          omniroute:
            cpus: "{{ cpu_omniroute }}"
            mem_limit: {{ mem_omniroute }}
            memswap_limit: {{ mem_omniroute }}
            pids_limit: {{ pids_omniroute }}
            logging:
              driver: {{ log_driver_critical }}
              options:
                max-size: "{{ log_max_size_critical }}"
                max-file: "{{ log_max_file_critical }}"
        EOF
        echo CHANGED
      register: r_openclaw
      changed_when: "'CHANGED' in r_openclaw.stdout"
      when: "'/opt/openclaw:present' in app_dirs.stdout_lines"

    # lightrag project
    - name: "70 | limits | lightrag ({{ cpu_lightrag }} CPU, {{ mem_lightrag }})"
      ansible.builtin.raw: |
        sudo tee /opt/lightrag/docker-compose.override.local.yml > /dev/null << 'EOF'
        # Managed by vps_management — host-level resource constraints only.
        # Restart:
        #   cd /opt/lightrag && sudo docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.override.local.yml up -d
        services:
          lightrag:
            cpus: "{{ cpu_lightrag }}"
            mem_limit: {{ mem_lightrag }}
            memswap_limit: {{ memswap_lightrag }}
            pids_limit: {{ pids_lightrag }}
            logging:
              driver: {{ log_driver_critical }}
              options:
                max-size: "{{ log_max_size_critical }}"
                max-file: "{{ log_max_file_critical }}"
        EOF
        echo CHANGED
      register: r_lightrag
      changed_when: "'CHANGED' in r_lightrag.stdout"
      when: "'/opt/lightrag:present' in app_dirs.stdout_lines"

    # integration-bus project: redis
    - name: "70 | limits | redis ({{ mem_redis }})"
      ansible.builtin.raw: |
        sudo tee /opt/integration-bus/docker-compose.override.local.yml > /dev/null << 'EOF'
        # Managed by vps_management — host-level memory constraints only.
        # Restart:
        #   cd /opt/integration-bus && sudo docker compose -f docker-compose.yml -f docker-compose.override.local.yml up -d
        services:
          redis:
            mem_limit: {{ mem_redis }}
            memswap_limit: {{ mem_redis }}
        EOF
        echo CHANGED
      register: r_redis
      changed_when: "'CHANGED' in r_redis.stdout"
      when: "'/opt/integration-bus:present' in app_dirs.stdout_lines"

    # ---- APPLY IMMEDIATELY VIA docker update (no restart) ----
    - name: "70 | apply | docker update — apply limits without restart"
      ansible.builtin.raw: |
        if sudo docker inspect openclaw-openclaw-gateway-1 >/dev/null 2>&1; then
          sudo docker update \
            --cpus={{ cpu_openclaw_gateway }} \
            --memory={{ mem_openclaw_gateway }} \
            --memory-swap={{ mem_openclaw_gateway }} \
            --pids-limit={{ pids_openclaw_gateway }} \
            --restart={{ restart_openclaw_gateway }} \
            openclaw-openclaw-gateway-1 && echo "gateway: ok" || echo "gateway: FAILED"
        else
          echo "gateway: skipped (container absent)"
        fi
        if sudo docker inspect omniroute >/dev/null 2>&1; then
          sudo docker update \
            --cpus={{ cpu_omniroute }} \
            --memory={{ mem_omniroute }} \
            --memory-swap={{ mem_omniroute }} \
            --pids-limit={{ pids_omniroute }} \
            omniroute && echo "omniroute: ok" || echo "omniroute: FAILED"
        else
          echo "omniroute: skipped (container absent)"
        fi
        if sudo docker inspect lightrag-lightrag-1 >/dev/null 2>&1; then
          sudo docker update \
            --cpus={{ cpu_lightrag }} \
            --memory={{ mem_lightrag }} \
            --memory-swap={{ memswap_lightrag }} \
            --pids-limit={{ pids_lightrag }} \
            lightrag-lightrag-1 && echo "lightrag: ok" || echo "lightrag: FAILED"
        else
          echo "lightrag: skipped (container absent)"
        fi
        if sudo docker inspect integration-bus-redis >/dev/null 2>&1; then
          sudo docker update \
            --memory={{ mem_redis }} \
            --memory-swap={{ mem_redis }} \
            integration-bus-redis && echo "redis: ok" || echo "redis: FAILED"
        else
          echo "redis: skipped (container absent)"
        fi
      register: r_update
      changed_when: "': ok' in r_update.stdout"

    - name: "70 | apply | display update result"
      ansible.builtin.debug:
        msg: "{{ r_update.stdout_lines | default(['(skipped in check mode)']) }}"

    # ---- VERIFY ----
    - name: "70 | verify | current limits (docker inspect)"
      ansible.builtin.raw: !unsafe |
        for c in openclaw-openclaw-gateway-1 omniroute lightrag-lightrag-1 integration-bus-redis; do
          sudo docker inspect "$c" \
            --format "$c NanoCpus={{.HostConfig.NanoCpus}} Memory={{.HostConfig.Memory}} MemorySwap={{.HostConfig.MemorySwap}} PidsLimit={{.HostConfig.PidsLimit}} Restart={{.HostConfig.RestartPolicy.Name}}:{{.HostConfig.RestartPolicy.MaximumRetryCount}} Log={{.HostConfig.LogConfig.Type}} LogOpts={{json .HostConfig.LogConfig.Config}}" \
            2>/dev/null || true
        done
      register: r_verify
      changed_when: false

    - name: "70 | verify | display"
      ansible.builtin.debug:
        msg: "{{ r_verify.stdout_lines | default(['(skipped in check mode)']) }}"

    - name: "70 | verify | free RAM after applying limits"
      ansible.builtin.raw: |
        free -m | awk 'NR==2{printf "RAM: used=%sMB avail=%sMB\n",$3,$7}'
        free -m | awk 'NR==3{printf "Swap: used=%sMB free=%sMB\n",$3,$4}'
      register: r_free
      changed_when: false

    - name: "70 | verify | display free"
      ansible.builtin.debug:
        msg: "{{ r_free.stdout_lines | default(['(skipped in check mode)']) }}"

    # ---- SUMMARY ----
    - name: "70 | summary"
      ansible.builtin.debug:
        msg:
          - "================================================="
          - "DOCKER LIMITS CRITICAL SUMMARY"
          - "================================================="
          - "openclaw-gateway:   {{ cpu_openclaw_gateway }} CPU / {{ mem_openclaw_gateway }} / pids {{ pids_openclaw_gateway }} / restart {{ restart_openclaw_gateway }} / logs {{ log_max_size_critical }} x{{ log_max_file_critical }}  (override: {{ r_openclaw.changed | default(false) }})"
          - "omniroute:          {{ cpu_omniroute }} CPU / {{ mem_omniroute }} / pids {{ pids_omniroute }}   (override: {{ r_openclaw.changed | default(false) }})"
          - "lightrag:           {{ cpu_lightrag }} CPU / {{ mem_lightrag }} / {{ memswap_lightrag }} swap / pids {{ pids_lightrag }}   (override: {{ r_lightrag.changed | default(false) }})"
          - "redis:              {{ mem_redis }}   (override: {{ r_redis.changed | default(false) }})"
          - "================================================="
          - "Cgroup and Gateway restart limits applied IMMEDIATELY via docker update where supported."
          - "Override files written for persistence on the next compose up; logging caps take effect after compose recreate."
          - "================================================="
          - "NOT touched (other-owner zones):"
          - "  routing-side containers (owned by routing project)"
          - "  bridge-service (limit already set in its own prod compose)"
          - "================================================="
          - "Memory budget (~3.8 GB RAM available):"
          - "  critical-gateway:    {{ mem_openclaw_gateway }}"
          - "  router-service:      {{ mem_omniroute }}"
          - "  knowledge-graph:     {{ mem_lightrag }}"
          - "  integration-bus:     {{ mem_redis }}"
          - "  60-* (5 services):   ~1664MB"
          - "  bridge-service:      256MB"
          - "  routing zone (est):  ~360MB (no limit)"
          - "  OS + kernel (est):   ~350MB"
          - "  CPU cap, AI path:    {{ cpu_ai_path_cap }} of 2.00 vCPU"
          - "================================================="
          - "When one service exceeds its limit, the others remain protected."
          - "Verify: ansible-playbook playbooks/99-verify.yml"
          - "================================================="
