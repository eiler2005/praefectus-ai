---
# Освобождение места на диске. Использует raw module (pipelining-safe на этом VPS).
# Безопасные операции (всегда с фильтрами по времени, volumes не трогаем):
#   - apt clean + autoremove
#   - journalctl vacuum (14d / 500M)
#   - docker container/image/builder prune --filter until=Nh
#   - logrotate config
#   - volumes NEVER touched
#
# Workflow:
#   ansible-playbook playbooks/10-disk-cleanup.yml --check   (dry-run — показывает план)
#   ansible-playbook playbooks/10-disk-cleanup.yml           (apply)

- name: "10 | Disk cleanup — VPS"
  hosts: vps
  gather_facts: false

  vars:
    report_dir_local:     "{{ playbook_dir }}/../../reports"
    docker_container_age: "{{ vault_docker_container_age | default('72h') }}"
    docker_image_age:     "{{ vault_docker_image_age     | default('168h') }}"
    docker_builder_age:   "{{ vault_docker_builder_age   | default('168h') }}"
    journal_keep_time:    "{{ vault_journal_keep_time    | default('14d') }}"
    journal_max_size:     "{{ vault_journal_max_size     | default('500M') }}"
    disk_crit_pct:        "{{ vault_disk_crit_pct        | default(90) }}"

  tasks:
    # ---- AUDIT (всегда первым) ----
    - name: "10 | audit | df before"
      ansible.builtin.raw: "df -BM --output=target,size,used,avail,pcent /"
      register: df_before
      changed_when: false
      check_mode: false

    - name: "10 | audit | parse disk pct"
      ansible.builtin.set_fact:
        disk_used_pct_before: "{{ df_before.stdout_lines[1].split()[-1] | regex_replace('%', '') | int }}"
        disk_used_mb_before:  "{{ df_before.stdout_lines[1].split()[2] | regex_replace('M', '') | int }}"

    - name: "10 | audit | display disk before"
      ansible.builtin.debug:
        msg: "Disk before: {{ disk_used_pct_before }}% ({{ disk_used_mb_before }}M used)"

    - name: "10 | init | capture UTC timestamp for report"
      ansible.builtin.raw: "date -u +%Y%m%dT%H%M%S"
      register: cleanup_ts
      changed_when: false
      check_mode: false

    - name: "10 | safety | stop if disk >= {{ disk_crit_pct }}%"
      ansible.builtin.fail:
        msg: |
          Disk is {{ disk_used_pct_before }}% — critical threshold {{ disk_crit_pct }}% reached.
          Stopping cleanup. Manual audit required first:
            ./modules/disk-observatory/bin/disk-report
      when: disk_used_pct_before | int >= disk_crit_pct | int

    - name: "10 | audit | top dirs"
      ansible.builtin.raw: |
        sudo du -xhd1 / /var /opt /home /root 2>/dev/null | sort -hr | head -50
      register: top_dirs
      changed_when: false
      check_mode: false

    - name: "10 | audit | docker disk before"
      ansible.builtin.raw: "docker system df 2>/dev/null || echo 'docker n/a'"
      register: docker_df_before
      changed_when: false
      check_mode: false

    - name: "10 | audit | docker active images"
      ansible.builtin.raw: !unsafe |
        docker ps -q 2>/dev/null \
          | xargs -r docker inspect --format '{{.Name}} {{.Config.Image}} {{.Image}}' 2>/dev/null \
          | sed 's#^/##' \
          || echo 'docker n/a'
      register: docker_active_images
      changed_when: false
      check_mode: false

    - name: "10 | audit | recent docker rollback images"
      ansible.builtin.raw: !unsafe |
        docker images --format '{{.ID}} {{.CreatedAt}} {{.Size}} {{.Repository}}:{{.Tag}}' 2>/dev/null \
          | awk '$0 ~ /ghostroute-console:(rollback-|[0-9a-f]{7,})/ {print}' \
          | sort -k2r \
          | head -30 \
          || echo 'docker n/a'
      register: docker_recent_rollbacks
      changed_when: false
      check_mode: false

    - name: "10 | audit | display top dirs + docker"
      ansible.builtin.debug:
        msg:
          - "Top directories:"
          - "{{ top_dirs.stdout_lines }}"
          - "Docker disk:"
          - "{{ docker_df_before.stdout_lines }}"
          - "Docker active images:"
          - "{{ docker_active_images.stdout_lines }}"
          - "Recent rollback/git-tag images skipped by age filters unless old enough:"
          - "{{ docker_recent_rollbacks.stdout_lines }}"

    # ---- APT ----
    - name: "10 | apt | clean"
      ansible.builtin.raw: "sudo apt-get clean -y && echo CHANGED"
      register: apt_clean
      changed_when: "'CHANGED' in apt_clean.stdout"
      tags: [apt]

    - name: "10 | apt | autoremove"
      ansible.builtin.raw: |
        sudo apt-get autoremove --purge -y 2>&1 | tail -3 && echo DONE
      register: apt_autoremove
      changed_when: "'removed' in apt_autoremove.stdout"
      tags: [apt]

    # ---- JOURNAL ----
    - name: "10 | journal | vacuum time ({{ journal_keep_time }})"
      ansible.builtin.raw: "sudo journalctl --vacuum-time={{ journal_keep_time }} 2>&1 | tail -2"
      register: journal_vac_time
      changed_when: true
      tags: [journal]

    - name: "10 | journal | vacuum size ({{ journal_max_size }})"
      ansible.builtin.raw: "sudo journalctl --vacuum-size={{ journal_max_size }} 2>&1 | tail -2"
      register: journal_vac_size
      changed_when: true
      tags: [journal]

    - name: "10 | journal | display"
      ansible.builtin.debug:
        msg:
          - "Journal vacuum time: {{ journal_vac_time.stdout_lines | default([]) }}"
          - "Journal vacuum size: {{ journal_vac_size.stdout_lines | default([]) }}"
      tags: [journal]

    # ---- DOCKER ----
    - name: "10 | docker | container prune (until={{ docker_container_age }})"
      ansible.builtin.raw: |
        docker container prune -f --filter "until={{ docker_container_age }}" 2>&1 | tail -2
      register: docker_cont_prune
      changed_when: "'Total reclaimed space' in docker_cont_prune.stdout and '0B' not in docker_cont_prune.stdout"
      tags: [docker]

    - name: "10 | docker | image prune (until={{ docker_image_age }})"
      ansible.builtin.raw: |
        docker image prune -af --filter "until={{ docker_image_age }}" 2>&1 | tail -2
      register: docker_img_prune
      changed_when: "'Total reclaimed space' in docker_img_prune.stdout and '0B' not in docker_img_prune.stdout"
      tags: [docker]

    - name: "10 | docker | builder prune (until={{ docker_builder_age }})"
      ansible.builtin.raw: |
        docker builder prune -af --filter "until={{ docker_builder_age }}" 2>&1 | tail -2
      register: docker_build_prune
      changed_when: true
      tags: [docker]

    - name: "10 | docker | check dangling volumes (NEVER auto-prune)"
      ansible.builtin.raw: "docker volume ls -f dangling=true -q"
      register: docker_dangling_vols
      changed_when: false
      check_mode: false
      tags: [docker]

    - name: "10 | docker | warn about dangling volumes"
      ansible.builtin.debug:
        msg: |
          ⚠️  {{ docker_dangling_vols.stdout_lines | length }} dangling volume(s) — manual review required.
          Volumes are NEVER pruned automatically (they may contain state).
          Inspect: docker volume inspect <name>
          Volumes: {{ docker_dangling_vols.stdout | trim }}
      when: (docker_dangling_vols.stdout | trim) | length > 0
      tags: [docker]

    - name: "10 | docker | docker disk after"
      ansible.builtin.raw: "docker system df 2>/dev/null || echo 'docker n/a'"
      register: docker_df_after
      changed_when: false
      check_mode: false
      tags: [docker]

    - name: "10 | docker | display prune results"
      ansible.builtin.debug:
        msg:
          - "Container prune: {{ docker_cont_prune.stdout_lines | last | default('n/a') }}"
          - "Image prune:     {{ docker_img_prune.stdout_lines | last | default('n/a') }}"
          - "Builder prune:   {{ docker_build_prune.stdout_lines | last | default('n/a') }}"
          - "Dangling volumes (manual): {{ docker_dangling_vols.stdout_lines | length }}"
          - "Docker disk after:"
          - "{{ docker_df_after.stdout_lines | default([]) }}"
      tags: [docker]

    # ---- LOGROTATE ----
    - name: "10 | logrotate | install config"
      ansible.builtin.raw: |
        sudo tee /etc/logrotate.d/vps-management > /dev/null << 'LOGROTATE_EOF'
        /var/log/nginx/*.log {
            daily
            rotate 14
            compress
            delaycompress
            missingok
            notifempty
            sharedscripts
        }
        /var/log/caddy/*.log {
            daily
            rotate 14
            compress
            delaycompress
            missingok
            notifempty
            sharedscripts
        }
        LOGROTATE_EOF
        echo CHANGED
      register: logrotate_install
      changed_when: "'CHANGED' in logrotate_install.stdout"
      tags: [logrotate]

    # ---- POST SUMMARY ----
    - name: "10 | post | df after"
      ansible.builtin.raw: "df -BM --output=target,size,used,avail,pcent /"
      register: df_after
      changed_when: false
      check_mode: false

    - name: "10 | post | parse disk pct after"
      ansible.builtin.set_fact:
        disk_used_pct_after: "{{ df_after.stdout_lines[1].split()[-1] | regex_replace('%', '') | int }}"
        disk_used_mb_after:  "{{ df_after.stdout_lines[1].split()[2] | regex_replace('M', '') | int }}"

    - name: "10 | post | summary"
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "DISK CLEANUP SUMMARY"
          - "========================================="
          - "Before: {{ disk_used_pct_before }}%  ({{ disk_used_mb_before }}M used)"
          - "After:  {{ disk_used_pct_after }}%  ({{ disk_used_mb_after }}M used)"
          - "Freed:  {{ (disk_used_mb_before | int) - (disk_used_mb_after | int) }}M"
          - ""
          - "Next: ansible-playbook playbooks/99-verify.yml"
          - "      — confirm all services still running."
          - "========================================="

    # ---- REPORT (written locally on Mac) ----
    - name: "10 | report | write cleanup-{{ cleanup_ts.stdout | trim }}.md"
      ansible.builtin.copy:
        dest: "{{ report_dir_local }}/cleanup-{{ cleanup_ts.stdout | trim }}.md"
        mode: "0644"
        content: |
          # Cleanup report — {{ inventory_hostname }} — {{ cleanup_ts.stdout | trim }}

          ## Disk
          | | Value |
          |---|---|
          | Before | {{ disk_used_pct_before }}% ({{ disk_used_mb_before }}M used) |
          | After  | {{ disk_used_pct_after }}% ({{ disk_used_mb_after }}M used) |
          | Freed  | {{ (disk_used_mb_before | int) - (disk_used_mb_after | int) }}M |

          ## APT
          - apt clean: {{ (apt_clean.changed | default(false)) | ternary('changed', 'no change') }}
          - apt autoremove: {{ (apt_autoremove.changed | default(false)) | ternary('changed', 'no change') }}

          ## Journal vacuum
          - Time ({{ journal_keep_time }}): {{ journal_vac_time.stdout_lines | default(['n/a']) | last }}
          - Size ({{ journal_max_size }}): {{ journal_vac_size.stdout_lines | default(['n/a']) | last }}

          ## Docker prune
          - Container (until={{ docker_container_age }}): {{ docker_cont_prune.stdout_lines | default(['(check mode)']) | last }}
          - Image     (until={{ docker_image_age }}): {{ docker_img_prune.stdout_lines | default(['(check mode)']) | last }}
          - Builder:  {{ docker_build_prune.stdout_lines | default(['(check mode)']) | last }}
          - Dangling volumes: {{ docker_dangling_vols.stdout_lines | length }} (NEVER auto-pruned)

          ## Docker disk (after)
          ```
          {{ docker_df_after.stdout | default('n/a') }}
          ```
      delegate_to: localhost
      become: false
      check_mode: false
